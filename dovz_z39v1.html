<!DOCTYPE html> 
<html lang="pl">

  <body>
		<font color="green" size="6">Menu<br></font>
		<font color="red" size="6">1 - Czerwony<br></font>
		<font color="blue" size="6">2 - Niebieski<br></font>
        <input type="button" name="Dovzhyk Dmytro" value="Oblicz" onclick="fun_dov()" /> 
		<script> 
		function fun_dov() { 
			var x_dov = prompt("Podaj kolor", ""); 
			if(x_dov == 1 || x_dov.toLowerCase() == "czerwony") { 
				document.write('<h1 style="color:red;size:7;">wczytałeś kolor czerwony</h1><br />'); } 
			else if(x_dov == 2 || x_dov.toLowerCase() == "niebieski") { 
				document.write('<h6 style="color:blue;size:7;">wczytałeś kolor niebieski</h6><br />'); 
			} 
		} 
		</script> 
   </body> 
 </html>
